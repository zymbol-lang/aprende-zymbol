<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Curso estructurado para aprender Zymbol desde cero — básico, intermedio y avanzado.">
  <title>Aprende Zymbol</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #4f46e5;
      --base-font-size: 16px;
      --base-line-height: 1.7;
      --base-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono-font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
      --cover-color: #fff;
      --cover-background-color: #0f0f1a;
      --sidebar-width: 280px;
      --sidebar-background: #0f0f1a;
      --sidebar-nav-link-color: #a0a0b8;
      --sidebar-nav-link-color--hover: #fff;
      --sidebar-nav-link-color--active: #4f46e5;
      --sidebar-nav-pagelink-color: #e2e8f0;
      --sidebar-nav-pagelink-font-weight: 600;
      --content-max-width: 820px;
      --code-block-background: #1a1a2e;
      --code-inline-background: #1e1e3f;
      --code-inline-color: #c4b5fd;
      --link-color: #4f46e5;
      --link-color--hover: #6d28d9;
      --heading-color: #1e1b4b;
      --blockquote-border-color: #4f46e5;
      --blockquote-background: #f5f3ff;
    }

    /* Cover page */
    section.cover {
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a3e 50%, #0f0f1a 100%) !important;
    }
    section.cover .cover-main {
      margin: 0 auto;
      max-width: 680px;
    }
    section.cover h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8, #c4b5fd, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    section.cover blockquote {
      border: none;
      background: none;
      color: #94a3b8;
      font-size: 1.15rem;
      font-style: italic;
    }
    section.cover p {
      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1.8;
    }
    section.cover .cover-main > p:last-child a {
      border-radius: 8px;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 0.7em 1.6em;
      font-size: 0.95rem;
    }
    section.cover .cover-main > p:last-child a:first-child {
      background: #4f46e5;
      border: 2px solid #4f46e5;
      color: #fff;
    }
    section.cover .cover-main > p:last-child a:last-child {
      background: transparent;
      border: 2px solid #4f46e5;
      color: #a78bfa;
    }

    /* Sidebar */
    .sidebar {
      background: #0f0f1a;
      border-right: 1px solid #1e1e3f;
    }
    .sidebar .app-name a {
      color: #a78bfa !important;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.03em;
    }
    .sidebar-nav > ul > li > p {
      color: #6366f1;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 1.4rem 0 0.4rem;
      padding-left: 0.5rem;
    }
    .sidebar-nav li a {
      color: #94a3b8;
      font-size: 0.875rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .sidebar-nav li a:hover {
      color: #e2e8f0;
      background: #1e1e3f;
    }
    .sidebar-nav li.active > a {
      color: #a78bfa;
      background: #1e1e3f;
      font-weight: 600;
    }

    /* Code blocks */
    pre[class*="language-"],
    pre {
      background: #1a1a2e !important;
      border-radius: 8px;
      border: 1px solid #2d2d5e;
    }
    code {
      font-family: var(--mono-font-family);
    }

    /* Tables */
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th {
      background: #f5f3ff;
      color: #4c1d95;
    }
    tr:nth-child(even) td {
      background: #faf9ff;
    }

    /* Blockquotes */
    blockquote {
      border-left: 4px solid #4f46e5;
      background: #f5f3ff;
      border-radius: 0 6px 6px 0;
      padding: 0.8rem 1rem;
    }

    /* Navegación inferior entre lecciones */
    .markdown-section hr + p a,
    .markdown-section p:last-child a {
      color: #4f46e5;
    }

    /* Search */
    .search input {
      background: #1e1e3f;
      border-color: #2d2d5e;
      color: #e2e8f0;
      border-radius: 6px;
    }
    .search input::placeholder {
      color: #64748b;
    }

    /* Scrollbar */
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: #2d2d5e; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="app">Cargando el curso...</div>

  <script>
    window.$docsify = {
      name: '⚡ Aprende Zymbol',
      repo: 'https://github.com/zymbol-lang/aprende-zymbol',
      homepage: 'README.md',
      coverpage: '_coverpage.md',
      onlyCover: false,
      loadSidebar: '_sidebar.md',
      subMaxLevel: 2,
      auto2top: true,
      relativePath: false,

      search: {
        placeholder: 'Buscar en el curso...',
        noData: 'Sin resultados',
        depth: 3,
        hideOtherSidebarContent: false,
      },

      copyCode: {
        buttonText: 'Copiar',
        errorText: 'Error',
        successText: '✓ Copiado',
      },

      pagination: {
        previousText: '← Anterior',
        nextText: 'Siguiente →',
        crossChapter: true,
        crossChapterText: true,
      },

      plugins: [
        function(hook) {
          hook.doneEach(function() {
            document.querySelectorAll('pre code').forEach(function(block) {
              if (!block.className) block.className = 'language-zymbol';
            });
          });
        }
      ]
    }
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <!-- Syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script>
</body>
</html>
