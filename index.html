<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Curso estructurado para aprender Zymbol desde cero — básico, intermedio y avanzado.">
  <title>Aprende Zymbol</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Apply theme before first paint — priority: stored > system > dark -->
  <script>
    (function () {
      var s = localStorage.getItem('zy-theme');
      var light = s === 'light' || (s !== 'dark' && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches);
      if (light) document.documentElement.classList.add('light');
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">Cargando el curso...</div>

  <script>
    window.$docsify = {
      name: 'Aprende Zymbol',
      logo: 'logo.png',
      repo: 'https://github.com/zymbol-lang/aprende-zymbol',
      homepage: 'README.md',
      coverpage: '_coverpage.md',
      onlyCover: false,
      loadSidebar: '_sidebar.md',
      subMaxLevel: 2,
      auto2top: true,
      relativePath: false,

      search: {
        placeholder: 'Buscar en el curso...',
        noData: 'Sin resultados',
        depth: 3,
        hideOtherSidebarContent: false,
      },

      copyCode: {
        buttonText: 'Copiar',
        errorText: 'Error',
        successText: '✓ Copiado',
      },

      pagination: {
        previousText: '← Anterior',
        nextText: 'Siguiente →',
        crossChapter: true,
        crossChapterText: true,
      },

      plugins: [
        function (hook) {
          hook.doneEach(function () {
            if (!window.zyHighlightCode) return;
            document.querySelectorAll('pre code').forEach(function (block) {
              var raw = block.textContent || '';
              if (!raw.trim()) return;
              block.innerHTML = zyHighlightCode(raw);
              block.className = 'language-zymbol';
            });
          });
        }
      ]
    };
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <!-- Zymbol syntax highlighter (ported from playground) -->
  <script src="zymbol-highlight.js"></script>

  <!-- Theme toggle -->
  <script src="theme.js"></script>
</body>
</html>
